name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_cuda_smoke:
        description: "Run CUDA smoke job (requires self-hosted GPU runner)"
        required: false
        default: false
        type: boolean

jobs:
  cpu-checks:
    name: CPU checks (no CUDA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        run: cargo test --locked

      - name: Cargo build without default features
        run: cargo build --locked --no-default-features

  cuda-smoke:
    name: CUDA smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_cuda_smoke == true
    runs-on: [self-hosted, linux, x64, gpu, cuda]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: CUDA diagnostics
        run: |
          nvidia-smi
          nvcc --version

      - name: Build with CUDA feature
        env:
          MYELIN_CUDA_ARCH: sm_120
          MYELIN_PTX_VERSION: "8.5"
        run: cargo build --locked --features cuda -vv

      - name: Verify generated PTX is non-stub
        shell: bash
        run: |
          set -euo pipefail
          ptx_dir=""
          for d in target/debug/build/myelin-accelerator-*/out; do
            if [[ -d "$d" ]]; then
              ptx_dir="$d"
              break
            fi
          done

          test -n "$ptx_dir"
          test -d "$ptx_dir"

          for f in spiking_network_sm_120.ptx vector_similarity_sm_120.ptx satsolver_sm_120.ptx; do
            test -f "$ptx_dir/$f"
            grep -q '^\.target sm_120' "$ptx_dir/$f"
          done

      - name: CUDA smoke done
        run: echo "CUDA build and PTX verification passed"
